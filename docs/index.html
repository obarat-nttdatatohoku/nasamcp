<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔭 NASA 今日の宇宙画像 (APOD)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0e1a;
      color: #e8eaf6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em; }

    main {
      width: 100%;
      max-width: 860px;
      padding: 2rem 1.5rem 4rem;
    }

    #loading {
      text-align: center;
      margin-top: 5rem;
      opacity: 0.6;
      font-size: 1.1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    #error-box {
      display: none;
      background: rgba(239,83,80,0.15);
      border: 1px solid rgba(239,83,80,0.4);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 3rem;
      text-align: center;
      color: #ef9a9a;
    }

    #card {
      display: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #media-wrap {
      position: relative;
      width: 100%;
      background: #000;
      text-align: center;
    }
    #media-wrap img {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      display: block;
    }
    #media-wrap iframe {
      width: 100%;
      height: 480px;
      border: none;
    }

    .info { padding: 1.8rem 2rem 2rem; }

    .date-badge {
      display: inline-block;
      background: rgba(100,181,246,0.15);
      border: 1px solid rgba(100,181,246,0.35);
      color: #90caf9;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      margin-bottom: 0.9rem;
    }

    .info h2 {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .copyright { font-size: 0.82rem; color: #90a4ae; margin-bottom: 1.2rem; }
    .explanation { font-size: 0.97rem; line-height: 1.75; color: #b0bec5; }

    .actions { margin-top: 1.6rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1565c0; color: #fff; border: none; cursor: pointer; }
    .btn-secondary {
      background: transparent;
      color: #90caf9;
      border: 1px solid rgba(100,181,246,0.4);
    }
    .btn-haiku {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #90caf9;
      border: 1px solid rgba(100,181,246,0.4);
      cursor: pointer;
    }

    #haiku-box {
      display: none;
      margin-top: 1.6rem;
      background: rgba(100,181,246,0.06);
      border: 1px solid rgba(100,181,246,0.25);
      border-radius: 12px;
      padding: 1.2rem 1.6rem;
    }
    #haiku-box h3 {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #90caf9;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }
    #haiku-text {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      font-size: 1.15rem;
      line-height: 2.0;
      color: #e8eaf6;
      white-space: pre-line;
      text-align: center;
    }
    #haiku-loading {
      text-align: center;
      color: #90a4ae;
      font-size: 0.9rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    footer {
      margin-top: auto;
      padding: 1rem;
      font-size: 0.78rem;
      color: #546e7a;
      text-align: center;
    }
    footer a { color: #78909c; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <span>🔭</span>
  <h1>NASA 今日の宇宙画像 &mdash; APOD</h1>
</header>

<main>
  <div id="loading">📡 データを取得中…</div>
  <div id="error-box"><p id="error-msg"></p></div>
  <div id="card">
    <div id="media-wrap"></div>
    <div class="info">
      <span class="date-badge" id="apod-date"></span>
      <h2 id="apod-title"></h2>
      <p class="copyright" id="apod-copyright"></p>
      <p class="explanation" id="apod-explanation"></p>
      <div class="actions">
        <a id="btn-hd" class="btn btn-primary" href="#" target="_blank" rel="noopener">🖼️ HD画像を開く</a>
        <a class="btn btn-secondary" href="https://apod.nasa.gov/" target="_blank" rel="noopener">🌐 APOD公式サイト</a>
        <button class="btn btn-haiku" id="btn-haiku" onclick="generateHaiku()">🎋 俳句を生成</button>
      </div>

      <div id="haiku-box">
        <h3>🎋 俳句</h3>
        <div id="haiku-loading" style="display:none">詠んでいます…</div>
        <div id="haiku-text"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  Powered by <a href="https://api.nasa.gov/" target="_blank">NASA APOD API</a>
</footer>

<script>
  const API_KEY = '__NASA_API_KEY__';
  const today   = new Date().toISOString().slice(0, 10);

  async function loadAPOD() {
    try {
      const res = await fetch(
        `https://api.nasa.gov/planetary/apod?api_key=${API_KEY}&date=${today}`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      renderAPOD(data);
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = `エラー: ${err.message}`;
      document.getElementById('error-box').style.display = 'block';
    }
  }

  function renderAPOD(data) {
    document.getElementById('loading').style.display = 'none';

    const wrap = document.getElementById('media-wrap');
    if (data.media_type === 'video') {
      wrap.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
    } else {
      const img = document.createElement('img');
      img.src = data.hdurl || data.url;
      img.alt = data.title;
      wrap.appendChild(img);
    }

    document.getElementById('apod-date').textContent        = data.date;
    document.getElementById('apod-title').textContent       = data.title;
    document.getElementById('apod-explanation').textContent = data.explanation;

    if (data.copyright) {
      document.getElementById('apod-copyright').textContent = `© ${data.copyright.trim()}`;
    }

    const hdBtn = document.getElementById('btn-hd');
    hdBtn.href = data.hdurl || data.url || '#';
    if (!data.hdurl && data.media_type === 'video') hdBtn.style.display = 'none';

    document.getElementById('card').style.display = 'block';
    document.title = `🔭 ${data.title} — NASA APOD`;
  }

  loadAPOD();

  // --- 俳句生成（フロントエンドのみ） ---
  const SMALL_KANA = new Set([...'ぁぃぅぇぉゃゅょゎァィゥェォャュョヮ']);
  const FUNNY_ENDING = ['でござる','だゼ','ニャ','だよ','かな','だよね'];
  const VOWELS = /[aeiouyAEIOUY]+/g;

  function isJapanese(text) {
    return /[\u3040-\u30FF\u4E00-\u9FFF]/.test(text);
  }

  function splitToMoras(text) {
    text = text.replace(/[\u3000\s]+/g, ' ')
               .replace(/[！？!?。、,\.\(\)\[\]「」『』"'：:；;／\\\-＿=\+\*<>\t\n\r]/g, '');
    const moras = [];
    for (const ch of text) {
      if (ch === ' ') continue;
      if (SMALL_KANA.has(ch) && moras.length) moras[moras.length - 1] += ch;
      else moras.push(ch);
    }
    return moras.filter(Boolean);
  }

  function composeHaikuFromMoras(moras) {
    const targets = [5, 7, 5];
    const lines = [];
    let idx = 0;
    for (const need of targets) {
      const acc = [];
      while (idx < moras.length && acc.length < need) acc.push(moras[idx++]);
      if (acc.length === need) lines.push(acc.join(''));
      else return null;
    }
    return lines.join('\n');
  }

  function generateHaikuJP(text) {
    const moras = splitToMoras(text);
    if (moras.length >= 17) {
      const h = composeHaikuFromMoras(moras);
      if (h) return Math.random() < 0.25 ? h + ' ' + FUNNY_ENDING[Math.random() * FUNNY_ENDING.length | 0] : h;
    }
    const pads = ['な','か','ね','よ','わ','の'];
    const lines = [];
    let ptr = 0;
    for (const need of [5, 7, 5]) {
      const acc = [];
      while (acc.length < need && ptr < moras.length) acc.push(moras[ptr++]);
      while (acc.length < need) acc.push(pads[Math.random() * pads.length | 0]);
      lines.push(acc.join(''));
    }
    const h = lines.join('\n');
    return Math.random() < 0.25 ? h + ' ' + FUNNY_ENDING[Math.random() * FUNNY_ENDING.length | 0] : h;
  }

  function countSyllables(word) {
    const w = word.replace(/[^A-Za-z]/g, '').toLowerCase().replace(/(?:es|ed)$/, '');
    if (!w) return 0;
    const m = w.match(/[aeiouy]+/g);
    return m ? m.length : 1;
  }

  function buildLineEN(target, words) {
    const fillers = ['softly','quiet','spark','tiny','sleepy','cosmic','silly','strange','lonely','cheeky'];
    const pool = [...words, ...fillers];
    const used = [];
    let total = 0, attempts = 0;
    while (total < target && attempts++ < 50) {
      const cand = pool[Math.random() * pool.length | 0];
      const s = countSyllables(cand);
      if (total + s <= target) { used.push(cand); total += s; }
      else {
        const small = pool.filter(w => countSyllables(w) <= target - total);
        if (!small.length) break;
        const sw = small[Math.random() * small.length | 0];
        used.push(sw); total += countSyllables(sw);
      }
    }
    while (total < target) { used.push(['a','oh','ha','so','sky','sun'][Math.random() * 6 | 0]); total++; }
    const line = used.join(' ');
    return Math.random() < 0.3 ? line + ' ' + FUNNY_ENDING[Math.random() * FUNNY_ENDING.length | 0] : line;
  }

  function generateHaikuEN(text) {
    const words = [...new Set(text.match(/[A-Za-z0-9'\-]+/g) || [])].slice(0, 20);
    const pool = words.length ? words : ['cosmos','star','moon','space','light'];
    return [buildLineEN(5, pool), buildLineEN(7, pool), buildLineEN(5, pool)].join('\n');
  }

  function generateHaiku() {
    const explanation = document.getElementById('apod-explanation').textContent;
    const box = document.getElementById('haiku-box');
    const textEl = document.getElementById('haiku-text');
    const btn = document.getElementById('btn-haiku');

    box.style.display = 'block';
    btn.disabled = true;
    textEl.textContent = '';

    setTimeout(() => {
      try {
        const haiku = isJapanese(explanation) ? generateHaikuJP(explanation) : generateHaikuEN(explanation);
        textEl.textContent = haiku;
      } catch(e) {
        textEl.textContent = 'エラー: ' + e.message;
      }
      btn.disabled = false;
    }, 300);
  }
</script>
</body>
</html>
